name: Build and Deploy Sphinx Docs to Public Repo

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx-book-theme myst_parser sphinx_design

      - name: Build Sphinx documentation
        run: |
          sphinx-build -M html docs/source docs/build

      - name: Deploy to Public Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone the public repo
          git clone --depth 1 --branch main https://github.com/PaulS-Argo/ArgoBEAST-Documentation.git public-docs

          # Copy built HTML files
          rsync -av --delete docs/build/html/ public-docs/

          cd public-docs
          git add .
          git commit -m "Update docs from private repo"

          git push https://x-access-token:${{ secrets.PERSONAL_TOKEN }}@github.com/PaulS-Argo/ArgoBEAST-Documentation.git main
