name: Build and Deploy Sphinx Docs to Public Repo

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx-book-theme myst_parser sphinx_design

      - name: Build Sphinx documentation
        run: |
          sphinx-build -M html docs/source docs/build

      - name: Debug PAT presence
        env:
          DOCS_PAT: ${{ secrets.ARGO_BEAST_DOCS }}
        run: |
          if [ -z "$DOCS_PAT" ]; then
            echo "❌ PAT is EMPTY or NOT LOADED"
            exit 1
          else
            echo "✅ PAT is LOADED (length: ${#DOCS_PAT})"
          fi
      - name: Force git to use PAT for all GitHub URLs
        run: |
          git config --global url."https://${{ secrets.ARGO_BEAST_DOCS }}@github.com/".insteadOf "https://github.com/"

      - name: Deploy to Public Docs Repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clean workspace clone
          rm -rf public-docs

          git clone --depth 1 --branch main https://${{ secrets.ARGO_BEAST_DOCS }}@github.com/PaulS-Argo/ArgoBEAST-Documentation.git public-docs

          rsync -av --delete docs/build/html/ public-docs/

          cd public-docs
          git add .
          if ! git diff --cached --quiet; then
            echo "Attempting to commit changes"
            git commit -m "Update docs from private repo"
            git push https://${{ secrets.ARGO_BEAST_DOCS }}@github.com/PaulS-Argo/ArgoBEAST-Documentation.git main
            echo "Changes commited"
          else
            echo "No changes to commit"
          fi
