name: Build and Deploy Sphinx Docs to Public Repo

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install sphinx-book-theme myst_parser sphinx_design

      - name: Build Sphinx documentation
        run: |
          sphinx-build -M html docs/source docs/build

      - name: Force git to use PAT for all GitHub URLs
        run: |
          git config --global url."https://${{ secrets.ARGO_BEAST_DOCS }}@github.com/".insteadOf "https://github.com/"

      - name: Deploy to Public Docs Repo
        run: |
          set -e
      
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
          rm -rf public-docs
      
          git clone --depth 1 --branch main \
            https://${{ secrets.ARGO_BEAST_DOCS }}@github.com/PaulS-Argo/ArgoBEAST-Documentation.git \
            public-docs
      
          # Copy docs *without deleting the repo’s .git folder*
          rsync -av --delete --exclude='.git/' docs/build/html/ public-docs/
      
          cd public-docs
      
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Update docs (run $GITHUB_RUN_NUMBER)"
          fi
      
          git push https://${{ secrets.ARGO_BEAST_DOCS }}@github.com/PaulS-Argo/ArgoBEAST-Documentation.git main

