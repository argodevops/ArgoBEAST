name: Publish to PyPI

on:
  push:
    tags:
      - 'v*' # Triggers on v2.1.2, etc.

jobs:
  release:
    name: Build and Publish
    runs-on: ubuntu-latest
    environment: pypi
    # This ensures the job only runs for tags or the main branch
    if: startsWith(github.ref, 'refs/tags/v') 
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build Package
        run: uv build

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always